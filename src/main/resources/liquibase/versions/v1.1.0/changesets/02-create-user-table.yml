databaseChangeLog:
  - changeSet:
      id: "202604061020"
      author: "dragan.bjelica"
      changes:
        - createTable:
            tableName: app_user
            columns:
              - column:
                  name: id
                  type: int
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: full_name
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: email
                  type: varchar(255)
                  constraints:
                    nullable: false
                    unique: true

              - column:
                  name: password
                  type: varchar(255)
                  constraints:
                    nullable: false

              - column:
                  name: user_role
                  type: varchar(50)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            tableName: app_user
            columnNames: email
            constraintName: uk_app_user_email

        - createIndex:
            tableName: app_user
            indexName: idx_app_user_email
            columns:
              - column:
                  name: email