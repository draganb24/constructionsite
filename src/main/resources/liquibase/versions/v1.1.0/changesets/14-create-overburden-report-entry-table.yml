databaseChangeLog:
  - changeSet:
      id: "202605011245"
      author: "dragan.bjelica"
      changes:

        - createTable:
            tableName: overburden_report_entries
            columns:
              - column:
                  name: id
                  type: int
                  constraints:
                    primaryKey: true
                    nullable: false

              - column:
                  name: report_id
                  type: int

              - column:
                  name: worker_id
                  type: int

              - column:
                  name: machine_id
                  type: int

              - column:
                  name: trip_count
                  type: int

              - column:
                  name: kilometers
                  type: decimal(10,2)

              - column:
                  name: machine_hours
                  type: decimal(10,2)

              - column:
                  name: fuel_consumption
                  type: decimal(10,2)

              - column:
                  name: tons
                  type: decimal(10,2)

              - column:
                  name: km_per_tone
                  type: decimal(10,4)

              - column:
                  name: mh_per_tone
                  type: decimal(10,4)

              - column:
                  name: std_range
                  type: varchar(255)

              - column:
                  name: note
                  type: varchar(500)

              - column:
                  name: start_work_time
                  type: time

              - column:
                  name: end_work_time
                  type: time

              - column:
                  name: start_work_time_gprs
                  type: time

              - column:
                  name: end_work_time_gprs
                  type: time

        - createSequence:
            sequenceName: overburden_report_entry_id_seq
            startValue: 1
            incrementBy: 1

        - addForeignKeyConstraint:
            baseTableName: overburden_report_entries
            baseColumnNames: report_id
            constraintName: fk_overburden_entry_report
            referencedTableName: overburden_reports
            referencedColumnNames: id

        - addForeignKeyConstraint:
            baseTableName: overburden_report_entries
            baseColumnNames: worker_id
            constraintName: fk_overburden_entry_worker
            referencedTableName: workers
            referencedColumnNames: id

        - addForeignKeyConstraint:
            baseTableName: overburden_report_entries
            baseColumnNames: machine_id
            constraintName: fk_overburden_entry_machine
            referencedTableName: machines
            referencedColumnNames: id

        - createIndex:
            tableName: overburden_report_entries
            indexName: idx_overburden_report_entries_report_id
            columns:
              - column:
                  name: report_id

        - createIndex:
            tableName: overburden_report_entries
            indexName: idx_overburden_report_entries_worker_id
            columns:
              - column:
                  name: worker_id

        - createIndex:
            tableName: overburden_report_entries
            indexName: idx_overburden_report_entries_machine_id
            columns:
              - column:
                  name: machine_id